name: Test and Coverage

on:
  push:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "tests/**"
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "tests/**"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COVERAGE_THRESHOLD: 75

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      coverage_percent: ${{ steps.coverage.outputs.percent }}
      coverage_passed: ${{ steps.coverage.outputs.passed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        id: coverage
        run: |
          cargo llvm-cov --lib --no-report --ignore-filename-regex "noisy\.rs|lib\.rs"
          cargo llvm-cov report --json --output-path coverage.json --ignore-filename-regex "noisy\.rs|lib\.rs"
          cargo llvm-cov report --html --output-dir coverage-html --ignore-filename-regex "noisy\.rs|lib\.rs"
          cargo llvm-cov report --ignore-filename-regex "noisy\.rs|lib\.rs" > coverage-summary.txt

          PERCENT=$(jq '.data[0].totals.lines.percent // 0' coverage.json | xargs printf "%.1f")
          echo "percent=$PERCENT" >> "$GITHUB_OUTPUT"

          if python -c "import sys; sys.exit(0 if float('$PERCENT') >= float('$COVERAGE_THRESHOLD') else 1)"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "Coverage: ${PERCENT}% (threshold: ${COVERAGE_THRESHOLD}%)"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Coverage below threshold: ${PERCENT}% (threshold: ${COVERAGE_THRESHOLD}%)"
          fi
          echo "$PERCENT" > coverage-percent.txt

      - name: Upload coverage HTML report
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 14

      - name: Upload coverage summary
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: |
            coverage.json
            coverage-summary.txt
            coverage-percent.txt

      - name: Get base branch coverage (for PR)
        if: github.event_name == 'pull_request'
        id: base_coverage
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }}:base_branch
          git worktree add base_worktree base_branch

          cd base_worktree
          cargo llvm-cov --lib --json --output-path ../base-coverage.json --ignore-filename-regex "noisy\.rs|lib\.rs" 2>/dev/null || echo '{"data":[{"totals":{"lines":{"percent":0}}}]}' > ../base-coverage.json

          cd ..
          BASE_PERCENT=$(jq '.data[0].totals.lines.percent // 0' base-coverage.json | xargs printf "%.1f")
          echo "percent=$BASE_PERCENT" >> "$GITHUB_OUTPUT"

          git worktree remove base_worktree --force 2>/dev/null || true

      - name: Write coverage to step summary
        run: |
          PERCENT=$(cat coverage-percent.txt)
          THRESHOLD=$COVERAGE_THRESHOLD
          BASE_PERCENT="${{ steps.base_coverage.outputs.percent }}"

          if python -c "import sys; sys.exit(0 if float('$PERCENT') >= float('$THRESHOLD') else 1)"; then
            STATUS="Passing"
          else
            STATUS="Below threshold"
          fi

          echo "## Code Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$BASE_PERCENT" ]; then
            echo "| Base Coverage | ${BASE_PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Threshold | ${THRESHOLD}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Detailed Report</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if coverage below threshold
        run: |
          PERCENT=$(cat coverage-percent.txt)
          THRESHOLD=$COVERAGE_THRESHOLD

          if python -c "import sys; sys.exit(0 if float('$PERCENT') < float('$THRESHOLD') else 1)"; then
            echo "Coverage ${PERCENT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${PERCENT}% meets threshold ${THRESHOLD}%"

  sprt-ci:
    needs: test-and-coverage
    if: needs.test-and-coverage.outputs.coverage_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check for previous commit
        id: check_parent
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            echo "has_parent=true" >> "$GITHUB_OUTPUT"
            echo "old_commit=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
          elif ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "No previous commit detected; skipping SPRT comparison."
            echo "has_parent=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_parent=true" >> "$GITHUB_OUTPUT"
            echo "old_commit=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OLD SPRT binary from previous commit
        if: steps.check_parent.outputs.has_parent == 'true'
        run: |
          set -e
          OLD_COMMIT="${{ steps.check_parent.outputs.old_commit }}"
          OLD_WORKTREE="$(mktemp -d)"

          git worktree add "$OLD_WORKTREE" "$OLD_COMMIT"
          cargo build --release --features sprt --bin sprt --manifest-path "$OLD_WORKTREE/Cargo.toml"
          mkdir -p "$GITHUB_WORKSPACE/target/release"
          cp "$OLD_WORKTREE/target/release/sprt" "$GITHUB_WORKSPACE/target/release/sprt_old"
          git worktree remove "$OLD_WORKTREE" --force

      - name: Run SPRT CLI (HEAD vs previous)
        if: steps.check_parent.outputs.has_parent == 'true'
        env:
          SPRT_CI_GAMES: "250"
          SPRT_CI_MIN_GAMES: "250"
          SPRT_CI_CONCURRENCY: "10"
          SPRT_CI_TC: "5+0.05"
        run: |
          set -o pipefail
          mkdir -p sprt
          cargo run --release --features sprt --bin sprt -- run \
            --old-bin target/release/sprt_old \
            --tc "$SPRT_CI_TC" \
            --concurrency "$SPRT_CI_CONCURRENCY" \
            --max-games "$SPRT_CI_GAMES" \
            --min-games "$SPRT_CI_MIN_GAMES" \
            --max-moves 200 \
            --results sprt/results.json \
            --games sprt/game_logs.json \
            2>&1 | tee sprt/sprt-ci.log

      - name: Upload SPRT CI result artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: sprt-ci-result
          path: |
            sprt/results.json
            sprt/sprt-ci.log
            sprt/game_logs.json
          if-no-files-found: ignore

      - name: Write SPRT summary to check
        if: always()
        run: |
          if [ "${{ steps.check_parent.outputs.has_parent }}" != "true" ]; then
            echo "### SPRT CI (HEAD vs previous commit)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped: no previous commit available for comparison." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ ! -f sprt/results.json ]; then
            echo "No SPRT CI result found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const resultPath = path.join(process.cwd(), 'sprt', 'results.json');
          const logPath = path.join(process.cwd(), 'sprt', 'sprt-ci.log');
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          if (!fs.existsSync(resultPath) || !summaryPath) {
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
          const logSummary = fs.existsSync(logPath)
            ? fs.readFileSync(logPath, 'utf8').split(/\r?\n/).filter((line) => line.trim().length > 0).slice(-20).join('\n')
            : '';
          const s = data.settings || {};
          const alpha = typeof s.alpha === 'number' ? s.alpha : 0.05;
          const beta = typeof s.beta === 'number' ? s.beta : 0.05;
          const elo0 = typeof s.elo0 === 'number' ? s.elo0 : 0;
          const elo1 = typeof s.elo1 === 'number' ? s.elo1 : 5;
          const minGames = typeof s.min_games === 'number' ? s.min_games : 250;
          const llr = typeof data.llr === 'number' ? data.llr : 0;
          const games = typeof data.total_games === 'number' ? data.total_games : ((data.wins || 0) + (data.losses || 0) + (data.draws || 0));
          const lowerBound = Math.log(beta / (1 - alpha));
          const upperBound = Math.log((1 - beta) / alpha);
          let verdict = 'INCONCLUSIVE';
          if (games >= minGames && llr >= upperBound) {
            verdict = 'PASS';
          } else if (games >= minGames && llr <= lowerBound) {
            verdict = 'FAIL';
          }
          const lines = [];
          lines.push('### SPRT CI (HEAD vs previous commit)');
          lines.push('');
          lines.push(`Verdict: **${verdict}**`);
          lines.push('');
          // Commit identities
          const fmtCommit = (sha, date) => sha ? (date ? `\`${sha}\` (${date})` : `\`${sha}\``) : '(unknown)';
          lines.push(`NEW: ${fmtCommit(data.new_commit, data.new_commit_date)}  vs  OLD: ${fmtCommit(data.old_commit, data.old_commit_date)}`);
          lines.push('');
          // Compact settings
          if (Object.keys(s).length > 0) {
            const varCount = typeof s.variant_count === 'number' ? s.variant_count : '?';
            const adjudication = typeof s.adjudication === 'number' ? s.adjudication : '?';
            const maxG = s.max_games != null ? s.max_games : '\u221e';
            lines.push(`Settings: SPRT[${elo0},${elo1}] \u03b1=${alpha} \u03b2=${beta} | TC=${s.tc ?? '?'} | ${varCount} variants | Adjudication: ${adjudication} cp | min/max games: ${minGames}/${maxG}`);
            lines.push('');
          }
          // Heuristic verdict based on Elo confidence interval
          if (typeof data.elo === 'number' && games > 0) {
            const elo = data.elo;
            const err = typeof data.elo_error === 'number' ? data.elo_error : 0;
            const lower = elo - err;
            const upper = elo + err;
            let heuristic = 'roughly equal';
            if (lower > 50) {
              heuristic = 'probably better';
            } else if (lower > 0) {
              heuristic = 'slightly better';
            } else if (upper < -50) {
              heuristic = 'probably worse';
            } else if (upper < 0) {
              heuristic = 'slightly worse';
            }
            lines.push(`Heuristic verdict (short run): **${heuristic}**`);
            lines.push('');
          }
          lines.push(`Games: ${games}  (W:${data.wins} L:${data.losses} D:${data.draws})`);
          if (typeof data.elo === 'number' && games > 0) {
            const eloStr = data.elo >= 0 ? `+${data.elo.toFixed(1)}` : data.elo.toFixed(1);
            const errStr = typeof data.elo_error === 'number' ? data.elo_error.toFixed(1) : 'n/a';
            lines.push(`Estimated Elo: ${eloStr} +/- ${errStr}`);
          }
          if (typeof llr === 'number') {
            lines.push(`LLR: ${llr.toFixed(2)}`);
          }
          lines.push('');
          if (logSummary) {
            lines.push('```text');
            lines.push(logSummary);
            lines.push('```');
          }
          fs.appendFileSync(summaryPath, lines.join('\n') + '\n');
          EOF
